name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install allure-pytest pytest-html

      - name: Install Playwright browsers
        run: |
          playwright install chromium

      - name: Start server in background
        run: |
          python app.py &
          echo "SERVER_PID=$!" >> $GITHUB_ENV

      - name: Wait for server
        run: |
          echo "Waiting for server to start..."
          for i in {1..30}; do
            if curl -s --max-time 2 http://localhost:3000/api/status > /dev/null 2>&1; then
              echo "Server is ready!"
              exit 0
            fi
            echo "Attempt $i/30: Server not ready yet..."
            sleep 2
          done
          echo "Server failed to start within 60 seconds"
          echo "Checking if server process is running..."
          ps aux | grep python || true
          echo "Checking port 3000..."
          netstat -tulpn 2>/dev/null | grep 3000 || true
          exit 1

      - name: Run tests with Allure
        run: pytest tests/ -v --tb=short --alluredir=allure-results

      - name: Stop server
        if: always()
        run: |
          if [ -n "$SERVER_PID" ]; then
            kill $SERVER_PID 2>/dev/null || true
          fi

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/

  allure-report:
    name: Generate Allure Report
    runs-on: ubuntu-22.04
    needs: test
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Allure
        run: |
          curl -Lo allure.tar.gz https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -xzf allure.tar.gz
          echo "$(pwd)/allure-2.27.0/bin" >> $GITHUB_PATH

      - name: Generate Allure report
        run: allure generate allure-results --clean -o allure-report

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/

  notify:
    name: Telegram Notification
    runs-on: ubuntu-22.04
    needs: [test, allure-report]
    if: always()

    steps:
      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            if [ "${{ needs.test.result }}" = "success" ]; then
              STATUS="✅ ALL TESTS PASSED"
              EMOJI="✅"
            else
              STATUS="❌ SOME TESTS FAILED"
              EMOJI="❌"
            fi
            
            MESSAGE="$EMOJI CI/CD Pipeline: $STATUS%0A"
            MESSAGE="${MESSAGE}Repository: ${{ github.repository }}%0A"
            MESSAGE="${MESSAGE}Branch: ${{ github.ref_name }}%0A"
            MESSAGE="${MESSAGE}Commit: ${{ github.sha }}%0A"
            MESSAGE="${MESSAGE}Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            
            curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
              -d "chat_id=$TELEGRAM_CHAT_ID" \
              -d "text=$MESSAGE"
          else
            echo "Telegram secrets not configured."
          fi