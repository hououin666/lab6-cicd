name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install allure-pytest

      - name: Install Playwright browsers
        run: |
          playwright install chromium

      - name: Start server
        run: |
          python app.py &
          echo "SERVER_PID=$!" >> $GITHUB_ENV

      - name: Wait for server
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:3000/api/status > /dev/null 2>&1; then
              echo "Server is ready!"
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Run tests with Allure
        run: pytest tests/ -v --tb=short --alluredir=allure-results

      - name: Stop server
        if: always()
        run: kill $SERVER_PID 2>/dev/null || true

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/

  # ============================================
  # JOB 2: Генерация Allure отчета (без Docker)
  # ============================================
  allure-report:
    name: Generate Allure Report
    runs-on: ubuntu-22.04
    needs: test
    if: always()

    steps:
      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Setup Java (требуется для Allure)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Allure CLI
        run: |
          curl -Lo allure.tar.gz https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -xzf allure.tar.gz -C /tmp
          echo "/tmp/allure-2.27.0/bin" >> $GITHUB_PATH

      - name: Generate Allure report
        run: |
          allure generate allure-results --clean -o allure-report
          echo "Allure report generated successfully"

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./allure-report
          destination_dir: .
          keep_files: true