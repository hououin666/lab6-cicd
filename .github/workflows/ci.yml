name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    name: Run tests on ${{ matrix.os }} | Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-22.04, windows-latest]
        python-version: ["3.11", "3.12"]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install allure-pytest pytest-html

      - name: Install Playwright browsers
        run: |
          playwright install chromium

      - name: Start server (Unix)
        if: runner.os != 'Windows'
        run: |
          python app.py &
          echo "SERVER_PID=$!" >> $GITHUB_ENV

      - name: Start server (Windows)
        if: runner.os == 'Windows'
        run: |
          Start-Process -NoNewWindow python app.py
          Start-Sleep -Seconds 5

      - name: Wait for server (Unix)
        if: runner.os != 'Windows'
        run: |
          echo "Waiting for server to start..."
          for i in {1..30}; do
            if curl -s http://localhost:3000/api/status > /dev/null 2>&1; then
              echo "Server is ready!"
              exit 0
            fi
            echo "Attempt $i/30: Server not ready yet..."
            sleep 1
          done
          echo "Server failed to start within 30 seconds"
          exit 1

      - name: Wait for server (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "Waiting for server to start..."
          for ($i=1; $i -le 30; $i++) {
            try {
              $response = Invoke-WebRequest -Uri "http://localhost:3000/api/status" -UseBasicParsing -TimeoutSec 1
              if ($response.StatusCode -eq 200) {
                Write-Host "Server is ready!"
                exit 0
              }
            } catch {
              Write-Host "Attempt $i/30: Server not ready yet..."
            }
            Start-Sleep -Seconds 1
          }
          Write-Host "Server failed to start within 30 seconds"
          exit 1

      - name: Run tests with Allure
        run: pytest tests/ -v --tb=short --alluredir=allure-results

      - name: Stop server (Unix)
        if: runner.os != 'Windows' && always()
        run: |
          if [ -n "$SERVER_PID" ]; then
            kill $SERVER_PID 2>/dev/null || true
          fi

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.os }}-py${{ matrix.python-version }}
          path: allure-results/

  # ============================================
  # JOB 2: Генерация Allure отчета
  # ============================================
  allure-report:
    name: Generate Allure Report
    runs-on: ubuntu-22.04
    needs: test
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          path: all-allure-results/

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Allure
        run: |
          curl -Lo allure.tar.gz https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -xzf allure.tar.gz
          echo "$(pwd)/allure-2.27.0/bin" >> $GITHUB_PATH

      - name: Merge results
        run: |
          mkdir -p merged-allure-results
          find all-allure-results -name "*.json" -exec cp {} merged-allure-results/ \;
          find all-allure-results -name "*.txt" -exec cp {} merged-allure-results/ \;
          find all-allure-results -name "*.png" -exec cp {} merged-allure-results/ \;

      - name: Generate Allure report
        run: allure generate merged-allure-results --clean -o allure-report

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          destination_dir: allure-reports/${{ github.run_number }}

  # ============================================
  # JOB 3: Telegram уведомление
  # ============================================
  notify:
    name: Telegram Notification
    runs-on: ubuntu-22.04
    needs: [test, allure-report]
    if: always()

    steps:
      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            if [ "${{ needs.test.result }}" = "success" ]; then
              STATUS="✅ ALL TESTS PASSED"
              EMOJI="✅"
            else
              STATUS="❌ SOME TESTS FAILED"
              EMOJI="❌"
            fi
            
            MESSAGE="$EMOJI CI/CD Pipeline: $STATUS%0A"
            MESSAGE="${MESSAGE}Repository: ${{ github.repository }}%0A"
            MESSAGE="${MESSAGE}Branch: ${{ github.ref_name }}%0A"
            MESSAGE="${MESSAGE}Commit: ${{ github.sha }}%0A"
            MESSAGE="${MESSAGE}Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            
            curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
              -d "chat_id=$TELEGRAM_CHAT_ID" \
              -d "text=$MESSAGE" \
              -d "disable_web_page_preview=true"
          else
            echo "Telegram secrets not configured."
          fi