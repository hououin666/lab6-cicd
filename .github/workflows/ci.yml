name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    name: ${{ matrix.os }} | Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-22.04, windows-latest]
        python-version: ["3.11", "3.12"]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-html
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Start server (Unix)
        if: runner.os != 'Windows'
        run: |
          python app.py &
          echo "SERVER_PID=$!" >> $GITHUB_ENV

      - name: Start server (Windows)
        if: runner.os == 'Windows'
        run: |
          Start-Process -NoNewWindow python app.py
          Start-Sleep -Seconds 5

      - name: Wait for server
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:3000/api/status > /dev/null 2>&1; then
              echo "Server is ready!"
              exit 0
            fi
            sleep 1
          done
          exit 1

      - name: Run Playwright tests
        run: pytest tests/ -v --tb=short --html=report.html --self-contained-html

      - name: Stop server (Unix)
        if: runner.os != 'Windows' && always()
        run: kill $SERVER_PID 2>/dev/null || true

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ matrix.os }}-py${{ matrix.python-version }}
          path: report.html