name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Позволяет запускать вручную

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ============================================
  # JOB 1: Модульные и API тесты
  # ============================================
  unit-and-api-tests:
    name: Unit & API Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests with pytest
        run: pytest tests/test_cart.py -v --tb=short
        continue-on-error: false

      - name: Upload pytest results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results-py${{ matrix.python-version }}
          path: |
            .pytest_cache/
            test-reports/

  # ============================================
  # JOB 2: BDD API тесты
  # ============================================
  bdd-api-tests:
    name: BDD API Tests
    runs-on: ubuntu-latest
    needs: unit-and-api-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Start server in background
        run: |
          python app.py &
          sleep 3

      - name: Run BDD tests with behave
        run: behave features/ --format pretty --no-summary

      - name: Upload behave results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: behave-results
          path: |
            reports/
            behave-report.html

  # ============================================
  # JOB 3: Playwright UI тесты
  # ============================================
  ui-tests:
    name: UI Tests
    runs-on: ubuntu-latest
    needs: bdd-api-tests

    strategy:
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install ${{ matrix.browser }} --with-deps

      - name: Start server in background
        run: |
          python app.py &
          sleep 3

      - name: Run Playwright tests
        run: pytest tests/test_cart.py -v --headed=false --browser=${{ matrix.browser }}
        continue-on-error: false

      - name: Upload Playwright results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-${{ matrix.browser }}
          path: |
            test-results/
            playwright-report/

  # ============================================
  # JOB 4: Генерация отчета и уведомление
  # ============================================
  report-and-notify:
    name: Generate Report & Notify
    runs-on: ubuntu-latest
    needs: [unit-and-api-tests, bdd-api-tests, ui-tests]
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts/

      - name: Create report directory
        run: mkdir -p final-report

      - name: List all artifacts
        run: ls -la all-artifacts/

      - name: Create summary report
        run: |
          echo "# CI/CD Test Results" > final-report/report.md
          echo "" >> final-report/report.md
          echo "## Test Summary" >> final-report/report.md
          echo "" >> final-report/report.md
          echo "| Test Suite | Status |" >> final-report/report.md
          echo "|------------|--------|" >> final-report/report.md
          
          if [ "${{ needs.unit-and-api-tests.result }}" = "success" ]; then
            echo "| Unit & API Tests | ✅ Passed |" >> final-report/report.md
          else
            echo "| Unit & API Tests | ❌ Failed |" >> final-report/report.md
          fi
          
          if [ "${{ needs.bdd-api-tests.result }}" = "success" ]; then
            echo "| BDD API Tests | ✅ Passed |" >> final-report/report.md
          else
            echo "| BDD API Tests | ❌ Failed |" >> final-report/report.md
          fi
          
          if [ "${{ needs.ui-tests.result }}" = "success" ]; then
            echo "| UI Tests | ✅ Passed |" >> final-report/report.md
          else
            echo "| UI Tests | ❌ Failed |" >> final-report/report.md
          fi
          
          echo "" >> final-report/report.md
          echo "## Details" >> final-report/report.md
          echo "Run ID: ${{ github.run_id }}" >> final-report/report.md
          echo "Branch: ${{ github.ref_name }}" >> final-report/report.md
          echo "Commit: ${{ github.sha }}" >> final-report/report.md

      - name: Upload final report
        uses: actions/upload-artifact@v4
        with:
          name: final-test-report
          path: final-report/

      - name: Notify Telegram
        if: always()
        run: |
          STATUS="${{ needs.unit-and-api-tests.result }}"
          if [ "$STATUS" = "success" ] && [ "${{ needs.bdd-api-tests.result }}" = "success" ] && [ "${{ needs.ui-tests.result }}" = "success" ]; then
            TEXT="✅ CI/CD Pipeline completed successfully!%0A"
            TEXT="${TEXT}Repo: ${{ github.repository }}%0A"
            TEXT="${TEXT}Branch: ${{ github.ref_name }}%0A"
            TEXT="${TEXT}Commit: ${{ github.sha }}%0A"
            TEXT="${TEXT}Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            TEXT="❌ CI/CD Pipeline failed!%0A"
            TEXT="${TEXT}Repo: ${{ github.repository }}%0A"
            TEXT="${TEXT}Branch: ${{ github.ref_name }}%0A"
            TEXT="${TEXT}Commit: ${{ github.sha }}%0A"
            TEXT="${TEXT}Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          
          if [ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ] && [ -n "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
              -d "text=$TEXT"
          fi